services:
  discord-bot:
    build: .
    container_name: zeythan-b
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - YOUTUBE_COOKIES_BASE64=${YOUTUBE_COOKIES_BASE64:-}
      - YTDLP_PROXY=${YTDLP_PROXY:-}
    volumes:
      - bot-data:/app/data

volumes:
  bot-data:
